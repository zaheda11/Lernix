{% extends "base.html" %}

{% block title %}Recover Password | LERNIX{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card" id="recovery-card">
        <h2 class="form-title" style="margin-bottom:1rem; text-align:center;"><i class="fa-solid fa-key"></i> Reset Password</h2>
        <p style="color:var(--text-muted); font-size:0.9rem; text-align:center; margin-bottom:2rem;">Enter your email address and new password to overwrite credentials.</p>

        <div id="recovery-alert" class="alert alert-danger" style="display:none; margin-bottom:1.5rem;">
            <span id="recovery-msg">Alert text</span>
        </div>

        <form id="recovery-form" onsubmit="handleRecoverySubmit(event)">
            <div class="form-group">
                <label class="form-label" for="reset-email">Email Address</label>
                <input type="email" id="reset-email" class="form-input" placeholder="e.g. student@lernix.edu" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="reset-new-password">New Password</label>
                <input type="password" id="reset-new-password" class="form-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;" id="reset-submit-btn">
                Update Password
            </button>

            <div style="text-align:center; margin-top:1.5rem;">
                <a href="{{ url_for('login_page') }}"><i class="fa-solid fa-arrow-left-long"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function handleRecoverySubmit(event) {
        event.preventDefault();
        const alertDiv = document.getElementById('recovery-alert');
        const msgSpan = document.getElementById('recovery-msg');
        
        alertDiv.className = 'alert alert-danger';
        alertDiv.style.display = 'none';

        const payload = {
            email: document.getElementById('reset-email').value,
            new_password: document.getElementById('reset-new-password').value
        };

        fetch('/api/auth/forgot_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alertDiv.className = 'alert alert-success';
                msgSpan.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${data.message}`;
                alertDiv.style.display = 'flex';
                document.getElementById('recovery-form').reset();
            } else {
                msgSpan.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${data.message}`;
                alertDiv.style.display = 'flex';
            }
        })
        .catch(err => {
            console.error(err);
            msgSpan.innerText = "Error. Verify database server connectivity.";
            alertDiv.style.display = 'flex';
        });
    }
</script>
{% endblock %}
